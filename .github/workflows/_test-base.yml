# =============================================================
# .github/workflows/_test-base.yml
# Reusable workflow — tests that a given distro's base image
# builds correctly and ROS2 is functional.
#
# Called by the main workflow. The leading underscore marks it
# as an internal/reusable workflow by convention.
#
# What it proves:
#   - The correct Docker image tag exists on Docker Hub
#   - setup.bash is present and sources without error
#   - ros2 CLI is executable and returns a version
#   - .bashrc has setup.bash sourced exactly once
#   - The workspace directory was created
# =============================================================

name: _test-base

on:
  workflow_call:
    inputs:
      distro:
        required: true
        type: string   # humble | jazzy | kilted
      variant:
        required: true
        type: string   # ros-base | desktop | desktop-full

jobs:
  test-base:
    name: "base · ${{ inputs.distro }}/${{ inputs.variant }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Dockerfile
        run: |
          HOST_UID="$(id -u)"
          node CI/generate.js \
            --distro   "${{ inputs.distro }}" \
            --variant  "${{ inputs.variant }}" \
            --tools    "bashrc,locale,sudo" \
            --username ros-dev \
            --uid      "${HOST_UID}" \
            --out      ./build-context

      - name: Show Dockerfile
        run: cat ./build-context/Dockerfile

      - name: Validate Compose YAML
        run: docker compose -f ./build-context/docker-compose.yml config --quiet

      - uses: docker/setup-buildx-action@v3


      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./build-context
          push: false
          load: true
          tags: ros2-test-base-${{ inputs.distro }}-${{ inputs.variant }}:ci
          cache-from: type=gha,scope=base-${{ inputs.distro }}-${{ inputs.variant }}
          cache-to: type=gha,mode=min,scope=base-${{ inputs.distro }}-${{ inputs.variant }}


      - name: Validate base
        run: |
          docker run --rm \
            -e ROS_DISTRO="${{ inputs.distro }}" \
            -e CI_TEST_SUITE=base \
            -e EXPECTED_WORKSPACE=/home/ros-dev/ros2_ws \
            -v "${{ github.workspace }}/build-context:/home/ros-dev/ros2_ws" \
            -w /home/ros-dev/ros2_ws \
            -v "${{ github.workspace }}/CI/validate.sh:/validate.sh:ro" \
            ros2-test-base-${{ inputs.distro }}-${{ inputs.variant }}:ci \
            bash /validate.sh
