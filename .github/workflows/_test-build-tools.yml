# =============================================================
# .github/workflows/_test-build-tools.yml
# Reusable workflow — tests that build tool apt packages install
# cleanly and the tools are actually callable.
#
# Key insight: build tools are just apt-get install lines.
# The commands are identical across distros. We only need to
# verify them on one distro (humble/ros-base). If apt can find
# the package and install it, the generated Dockerfile is correct.
#
# Only re-runs when ros2-docker-gen/CI/generate.js changes (package names) or
# this workflow file changes.
#
# What it proves:
#   - colcon is installed and callable
#   - rosdep is installed, init succeeds, update succeeds
#   - python3 + pip are present
#   - git is present
#   - cmake / build-essential compile a trivial C++ file
#   - vcstool is present (if enabled)
# =============================================================

name: _test-build-tools

on:
  workflow_call:
    inputs:
      distro:
        required: false
        type: string
        default: humble    # run on humble — representative of all distros

jobs:
  test-build-tools:
    name: "build-tools · ${{ inputs.distro }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Dockerfile (all build tools enabled)
        run: |
          HOST_UID="$(id -u)"
          node CI/generate.js \
            --distro   "${{ inputs.distro }}" \
            --variant  "ros-base" \
            --tools    "colcon,rosdep,python3,git,cmake,vcstool,bashrc,locale,sudo" \
            --username ros-dev \
            --uid      "${HOST_UID}" \
            --out      ./build-context

      - name: Show Dockerfile
        run: cat ./build-context/Dockerfile

      - name: Validate Compose YAML
        run: docker compose -f ./build-context/docker-compose.yml config --quiet

      - uses: docker/setup-buildx-action@v3


      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./build-context
          push: false
          load: true
          tags: ros2-test-tools-${{ inputs.distro }}:ci
          cache-from: type=gha,scope=tools-${{ inputs.distro }}
          cache-to: type=gha,mode=min,scope=tools-${{ inputs.distro }}


      - name: Validate build tools
        run: |
          docker run --rm \
            -e ROS_DISTRO="${{ inputs.distro }}" \
            -e CI_TEST_SUITE=build-tools \
            -e EXPECTED_WORKSPACE=/home/ros-dev/ros2_ws \
            -v "${{ github.workspace }}/build-context:/home/ros-dev/ros2_ws" \
            -w /home/ros-dev/ros2_ws \
            -v "${{ github.workspace }}/CI/validate.sh:/validate.sh:ro" \
            ros2-test-tools-${{ inputs.distro }}:ci \
            bash /validate.sh
